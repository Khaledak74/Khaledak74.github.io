                    Want to collaborate, have a question, or just want to talk security? Reach out. 
                </p>

                    </a>
                    <a href="https://www.linkedin.com/in/khaled-motawea-0861b1265/" target="_blank" title="LinkedIn" class="contact-icon-link">

                    </a>
                    <a href="https://www.youtube.com/@Kmotawea" target="_blank" title="YouTube" class="contact-icon-link">
                        <div class="icon" style="font-size: 2.5rem;">📺</div>
                    </a>

                        <div class="icon" style="font-size: 2.5rem;">📸</div>
                    </a>
                </div>

                <div class="divider"></div>

                <h2 class="section-title" style="font-size: 1.2rem;">Send a Message</h2>
                <form class="contact-form">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" placeholder="Your name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="your@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" placeholder="What's on your mind?" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Send Message</button>
                </form>
            </div>
        </section>
